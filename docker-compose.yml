services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geojson
      POSTGRES_USER: geojson
      POSTGRES_PASSWORD: geojson
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geojson"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    # Migrations run on every container start; they are idempotent and
    # a no-op when there are no pending changes. `docker compose up
    # --wait` is the single-command bring-up: it starts db, waits for
    # the healthcheck, then starts web (which migrates + serves).
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
